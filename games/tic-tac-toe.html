<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:80px;
}

h1{
    color:#00e5ff;
}

#board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    grid-gap:10px;
    justify-content:center;
    margin-top:30px;
}

.cell{
    width:100px;
    height:100px;
    background:#1e1e1e;
    font-size:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border-radius:10px;
}

.cell:hover{
    background:#333;
}

#status{
    margin-top:20px;
    font-size:20px;
}

button{
    margin-top:20px;
    padding:10px 20px;
    font-size:16px;
    background:#00e5ff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#00bcd4;
}

</style>

</head>

<body>

<h1>Tic Tac Toe</h1>

<div id="board">

<div class="cell" onclick="play(0)"></div>
<div class="cell" onclick="play(1)"></div>
<div class="cell" onclick="play(2)"></div>

<div class="cell" onclick="play(3)"></div>
<div class="cell" onclick="play(4)"></div>
<div class="cell" onclick="play(5)"></div>

<div class="cell" onclick="play(6)"></div>
<div class="cell" onclick="play(7)"></div>
<div class="cell" onclick="play(8)"></div>

</div>

<div id="status">Player X's turn</div>

<button onclick="restart()">Restart Game</button>

<script>

let board = ["","","","","","","","",""]
let current = "X"
let gameOver = false

const cells = document.querySelectorAll(".cell")

const wins = [
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
]

function play(i){

if(board[i] !== "" || gameOver) return

board[i] = current
cells[i].innerText = current

checkWin()

current = current === "X" ? "O" : "X"

document.getElementById("status").innerText =
"Player " + current + "'s turn"

}

function checkWin(){

for(let combo of wins){

let a = combo[0]
let b = combo[1]
let c = combo[2]

if(board[a] && board[a] === board[b] && board[a] === board[c]){

document.getElementById("status").innerText =
"🎉 Player " + board[a] + " wins!"

gameOver = true

return

}

}

if(!board.includes("")){

document.getElementById("status").innerText = "It's a draw!"
gameOver = true

}

}

function restart(){

board = ["","","","","","","","",""]
current = "X"
gameOver = false

cells.forEach(cell => cell.innerText = "")

document.getElementById("status").innerText = "Player X's turn"

}

</script>

</body>
</html>

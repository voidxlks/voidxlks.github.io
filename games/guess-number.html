<!DOCTYPE html>
<html>
<head>
<title>Guess The Number</title>

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:120px;
}

h1{
    color:#00e5ff;
}

input{
    padding:10px;
    font-size:18px;
    width:120px;
}

button{
    padding:10px 20px;
    font-size:18px;
    margin-left:10px;
    background:#00e5ff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#00bcd4;
}

#message{
    font-size:22px;
    margin-top:20px;
}

</style>

</head>

<body>

<h1>Guess The Number</h1>

<p>I'm thinking of a number between <b>1 and 100</b>.</p>

<input id="guess" type="number" placeholder="Enter guess">

<button onclick="checkGuess()">Guess</button>

<div id="message"></div>

<script>

let secret = Math.floor(Math.random()*100)+1
let attempts = 0

function checkGuess(){

let guess = Number(document.getElementById("guess").value)
attempts++

if(guess === secret){

document.getElementById("message").innerHTML =
"🎉 Correct! You guessed it in " + attempts + " tries."

}

else if(guess > secret){

document.getElementById("message").innerHTML =
"⬇ Too high! Try again."

}

else{

document.getElementById("message").innerHTML =
"⬆ Too low! Try again."

}

}

</script>

</body>
</html>

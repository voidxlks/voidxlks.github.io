<!DOCTYPE html>
<html>
<head>
<title>Snake Game</title>

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:50px;
}

h1{
    color:#00e5ff;
}

canvas{
    background:#111;
    border:3px solid #00e5ff;
    margin-top:20px;
}

#score{
    font-size:20px;
    margin-top:10px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
    background:#00e5ff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#00bcd4;
}

</style>

</head>

<body>

<h1>Snake Game</h1>

<p>Use arrow keys to move.</p>

<div id="score">Score: 0</div>

<canvas id="game" width="400" height="400"></canvas>

<br>
<button onclick="restart()">Restart</button>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let grid = 20
let snake = [{x:160,y:160}]
let dx = grid
let dy = 0
let food = {x:320,y:320}
let score = 0

function gameLoop(){

setTimeout(function(){

requestAnimationFrame(gameLoop)

ctx.clearRect(0,0,canvas.width,canvas.height)

snake[0].x += dx
snake[0].y += dy

if(snake[0].x < 0) snake[0].x = canvas.width-grid
if(snake[0].x >= canvas.width) snake[0].x = 0
if(snake[0].y < 0) snake[0].y = canvas.height-grid
if(snake[0].y >= canvas.height) snake[0].y = 0

snake.unshift({x:snake[0].x,y:snake[0].y})

if(snake[0].x === food.x && snake[0].y === food.y){

score++
document.getElementById("score").innerText = "Score: " + score

food.x = Math.floor(Math.random()*20)*grid
food.y = Math.floor(Math.random()*20)*grid

}else{

snake.pop()

}

ctx.fillStyle="red"
ctx.fillRect(food.x,food.y,grid-1,grid-1)

ctx.fillStyle="lime"

snake.forEach(function(part,index){

ctx.fillRect(part.x,part.y,grid-1,grid-1)

for(let i=index+1;i<snake.length;i++){

if(part.x === snake[i].x && part.y === snake[i].y){

alert("Game Over! Score: "+score)
restart()

}

}

})

},100)

}

document.addEventListener("keydown",function(e){

if(e.key === "ArrowLeft" && dx === 0){
dx = -grid
dy = 0
}

else if(e.key === "ArrowUp" && dy === 0){
dx = 0
dy = -grid
}

else if(e.key === "ArrowRight" && dx === 0){
dx = grid
dy = 0
}

else if(e.key === "ArrowDown" && dy === 0){
dx = 0
dy = grid
}

})

function restart(){

snake = [{x:160,y:160}]
dx = grid
dy = 0
score = 0
document.getElementById("score").innerText = "Score: 0"

}

gameLoop()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoidXLKS</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0b0b0b;
    color:white;
}

header{
    background:#111;
    padding:30px;
    text-align:center;
    border-bottom:2px solid #6b00ff;
}

header h1{
    margin:0;
    font-size:40px;
    color:#8a2cff;
}

nav{
    text-align:center;
    padding:15px;
}

nav a{
    color:white;
    margin:10px;
    text-decoration:none;
    font-weight:bold;
}

section{
    padding:40px;
    max-width:900px;
    margin:auto;
}

.game-card{
    background:#141414;
    padding:20px;
    margin:20px 0;
    border-radius:10px;
}

button{
    background:#8a2cff;
    border:none;
    padding:12px 20px;
    color:white;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#a24dff;
}

#robuxMessage{
    margin-top:20px;
    color:#00ff9d;
}

footer{
    text-align:center;
    padding:20px;
    background:#111;
    margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>VoidXLKS</h1>
<p>2D Games • Experiments • Random Fun</p>
</header>

<nav>
<a href="#games">Games</a>
<a href="#robux">Free Robux</a>
<a href="https://github.com/voidxlks">GitHub</a>
</nav>

<section id="games">
<h2>🎮 2D Games</h2>

<div class="game-card">
<h3>Square Jumper</h3>
<p>A simple 2D jumping game. Avoid obstacles!</p>
<button onclick="alert('Game coming soon!')">Play</button>
</div>

<div class="game-card">
<h3>Pixel Runner</h3>
<p>Run as far as possible in this endless runner.</p>
<button onclick="alert('Game coming soon!')">Play</button>
</div>

</section>

<section id="robux">
<h2>🪙 Free Robux [FOR FUN]</h2>
<p>This is obviously a joke button.</p>

<button onclick="freeRobux()">Get Free Robux</button>

<p id="robuxMessage"></p>

</section>

<footer>
<p>© 2026 VoidXLKS • Made for fun</p>
</footer>

<script>

function freeRobux(){

let messages = [
"Nice try 😎",
"No robux here!",
"Maybe next time...",
"You actually clicked it 💀",
"Still no robux."
];

let random = messages[Math.floor(Math.random()*messages.length)];

document.getElementById("robuxMessage").innerText = random;

}

</script>

</body>
</html>

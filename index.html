<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
    body {
        font-family: Arial;
        background: radial-gradient(circle, #0a0a0a, #000);
        color: #fff;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
        font-size: 40px;
    }

    /* 🌈 FIXED RAINBOW TEXT */
    .rainbow {
        font-size: 20px;
        font-weight: bold;
        background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet);
        background-size: 300%;
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
        animation: rainbowMove 5s linear infinite;
        margin-bottom: 20px;
    }

    @keyframes rainbowMove {
        0% { background-position: 0%; }
        100% { background-position: 300%; }
    }

    .menu {
        margin: 20px;
    }

    button {
        margin: 10px;
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 8px;
        border: none;
        background: #111;
        color: #00ffcc;
        box-shadow: 0 0 10px #00ffcc;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.1);
        background: #00ffcc;
        color: black;
    }

    .game-container {
        margin: 20px auto;
        width: 600px;
        height: 400px;
        border: 2px solid #00ffcc;
        border-radius: 10px;
        box-shadow: 0 0 15px #00ffcc;
    }
</style>
</head>
<body>

<h1>My Website</h1>
<div class="rainbow">Nothing more.</div>

<div class="menu">
    <button onclick="alert('Game menu here')">Play</button>
</div>

<div class="game-container"></div>

</body>
</html>

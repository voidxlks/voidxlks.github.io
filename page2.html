<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoidXLKS - Games</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0b0b0b;
    color:white;
    text-align:center;
}

header{
    background:#111;
    padding:25px;
    border-bottom:2px solid #6b00ff;
}

h1{
    color:#8a2cff;
}

a{
    color:#8a2cff;
    text-decoration:none;
    font-weight:bold;
}

canvas{
    background:#141414;
    margin-top:20px;
    border:2px solid #8a2cff;
}

button{
    background:#8a2cff;
    border:none;
    padding:10px 18px;
    color:white;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#a24dff;
}

</style>
</head>

<body>

<header>
<h1>VoidXLKS Games</h1>
<p><a href="index.html">⬅ Back to Home</a></p>
</header>

<h2>🎮 Square Dodger</h2>
<p>Use arrow keys to avoid the red squares!</p>

<canvas id="game" width="500" height="400"></canvas>

<br>
<button onclick="restartGame()">Restart Game</button>

<p id="score">Score: 0</p>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let player = {x:230,y:180,size:20}
let enemies = []
let score = 0
let gameOver = false

function spawnEnemy(){
    enemies.push({
        x:Math.random()*480,
        y:-20,
        size:20,
        speed:2+Math.random()*2
    })
}

setInterval(spawnEnemy,1000)

document.addEventListener("keydown",move)

function move(e){

if(e.key==="ArrowLeft") player.x-=20
if(e.key==="ArrowRight") player.x+=20
if(e.key==="ArrowUp") player.y-=20
if(e.key==="ArrowDown") player.y+=20

}

function update(){

if(gameOver) return

ctx.clearRect(0,0,500,400)

ctx.fillStyle="cyan"
ctx.fillRect(player.x,player.y,player.size,player.size)

ctx.fillStyle="red"

for(let i=0;i<enemies.length;i++){

let en=enemies[i]

en.y+=en.speed

ctx.fillRect(en.x,en.y,en.size,en.size)

if(
player.x < en.x+en.size &&
player.x+player.size > en.x &&
player.y < en.y+en.size &&
player.y+player.size > en.y
){
gameOver=true
document.getElementById("score").innerText="Game Over! Score: "+score
}

}

score++
document.getElementById("score").innerText="Score: "+score

requestAnimationFrame(update)

}

function restartGame(){

player.x=230
player.y=180
enemies=[]
score=0
gameOver=false

update()

}

update()

</script>

</body>
</html>

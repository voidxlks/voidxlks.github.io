<!DOCTYPE html>
<html>
<head>
<title>Void Browser</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:#00e5ff;
color:black;
padding:10px;
text-align:center;
}

#toolbar{
display:flex;
gap:10px;
padding:10px;
background:#1a1a1a;
}

#url{
flex:1;
padding:10px;
font-size:16px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
font-size:14px;
border:none;
border-radius:6px;
background:#00e5ff;
cursor:pointer;
}

button:hover{
background:#00bcd4;
}

iframe{
width:100%;
height:88vh;
border:none;
background:white;
}

</style>
</head>

<body>

<header>
<h1>Void Browser</h1>
<p>Explore the web from the void</p>
</header>

<div id="toolbar">

<button onclick="home()">Home</button>

<button onclick="back()">Back</button>

<input id="url" placeholder="Search or enter website">

<button onclick="go()">Go</button>

<button onclick="games()">Games</button>

</div>

<iframe id="frame" src=""></iframe>

<script>

let frame = document.getElementById("frame")

function go(){

let input = document.getElementById("url").value

if(input.startsWith("http")){
frame.src = input
}

else if(input.includes(".")){
frame.src = "https://" + input
}

else{
frame.src = "https://duckduckgo.com/?q=" + input
}

}

function back(){
frame.contentWindow.history.back()
}

function home(){
frame.src = "about:blank"
}

function games(){
frame.src = "games/clicker.html"
}

</script>

</body>
</html>
